
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@200;300&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    min-height: 100%;
  }

  .site {
    display: flex;
    min-height: 100vh;
    background: #ffffff;
    font-family: 'DM Sans', sans-serif;
    overflow-y: auto;
  }

  .sidebar {
    width: 240px;
    min-width: 200px;
    min-height: 100vh;
    border-right: 0.5px solid rgba(0,0,0,0.08);
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    padding: 48px 44px;
    position: sticky;
    top: 0;
  }

  .sidebar-brand {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    width: 100%;
    max-width: 156px;
    margin: 0 auto;
    padding: 14px 18px;
    border-radius: 26px 26px 26px 6px;
    background: #ffffff;
    border: 1px solid rgba(0,0,0,0.08);
    color: #333;
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    font-size: 11px;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    user-select: none;
  }

  .brand-label {
    display: inline-block;
    font-size: 12px;
    letter-spacing: 0.24em;
    color: #4f4f4f;
  }

  .brand-dots {
    display: inline-flex;
    gap: 6px;
    margin-top: 10px;
    align-self: flex-start;
  }

  .brand-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(0,0,0,0.2);
    opacity: 0.5;
    animation: dot-fade 1.3s infinite ease-in-out;
  }

  .brand-dot:nth-child(1) { animation-delay: 0s; }
  .brand-dot:nth-child(2) { animation-delay: 0.15s; }
  .brand-dot:nth-child(3) { animation-delay: 0.3s; }

  @keyframes dot-fade {
    0%, 100% { opacity: 0.25; transform: translateY(0); }
    50% { opacity: 1; transform: translateY(-2px); }
  }

  .sidebar-dash {
    font-family: 'DM Sans', sans-serif;
    font-weight: 200;
    color: #b0b0b0;
    font-size: 13px;
    margin-top: 4px;
    letter-spacing: 0.12em;
  }

  .sidebar-nav {
    margin-top: 88px;
    display: flex;
    flex-direction: column;
    gap: 32px;
  }

  .nav-item {
    font-size: 11px;
    font-weight: 300;
    color: #aaa;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    cursor: pointer;
    transition: color 0.2s;
  }

  .nav-item:hover { color: #1a1a1a; }
  .nav-item.active { color: #1a1a1a; }

  .sidebar-footer {
    margin-top: auto;
    font-size: 10px;
    color: #ccc;
    letter-spacing: 0.1em;
    font-weight: 300;
  }

  .main {
    flex: none;
    width: min(640px, calc(100vw - 260px));
    height: 100vh;
    padding: 64px 48px;
    scrollbar-width: thin;
    scrollbar-color: rgba(0,0,0,0.1) transparent;
  }

  .main::-webkit-scrollbar { width: 4px; }
  .main::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 2px; }

  .placeholder-block {
    width: 100%;
    height: 180px;
    background: #f8f8f6;
    border-radius: 4px;
    margin-bottom: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .placeholder-text {
    font-size: 11px;
    letter-spacing: 0.15em;
    color: #ccc;
    font-weight: 300;
    text-transform: uppercase;
  }

  .section-label {
    font-size: 10px;
    letter-spacing: 0.2em;
    color: #ccc;
    text-transform: uppercase;
    font-weight: 300;
    margin-bottom: 20px;
    margin-top: 48px;
  }

  .section-label:first-child { margin-top: 0; }
</style>

<div class="site">
  <aside class="sidebar">
    <div>
      <div class="sidebar-brand">
        <span class="brand-label">DAYDREAMING</span>
        <div class="brand-dots">
          <span class="brand-dot"></span>
          <span class="brand-dot"></span>
          <span class="brand-dot"></span>
        </div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-item active">about</div>
      <div class="nav-item">work</div>
      <div class="nav-item">writing</div>
      <div class="nav-item">contact</div>
    </nav>
    <div class="sidebar-footer">© 2026</div>
  </aside>

  <main class="main">
    <div class="section-label">intro</div>
    <div class="placeholder-block"><span class="placeholder-text">coming soon</span></div>

    <div class="section-label">featured</div>
    <div class="placeholder-block"><span class="placeholder-text">coming soon</span></div>
    <div class="placeholder-block"><span class="placeholder-text">coming soon</span></div>

    <div class="section-label">more</div>
    <div class="placeholder-block"><span class="placeholder-text">coming soon</span></div>
  </main>
</div>
